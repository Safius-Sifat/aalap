name: Build And Deploy To VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      ghcr_owner: ${{ steps.owner.outputs.value }}
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize GHCR owner
        id: owner
        shell: bash
        run: |
          set -euo pipefail
          echo "value=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for frontend
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.value }}/aalap-frontend
          tags: |
            type=sha,format=short
            type=raw,value=latest

      - name: Extract metadata for backend
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.value }}/aalap-backend
          tags: |
            type=sha,format=short
            type=raw,value=latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}

      - name: Resolve image tag
        id: meta
        run: echo "version=sha-$(echo "$GITHUB_SHA" | cut -c1-7)" >> "$GITHUB_OUTPUT"

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify deployment files
        run: ls -la deploy

      - name: Validate GHCR credentials
        shell: bash
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          set -euo pipefail
          if [[ -z "${GHCR_USERNAME:-}" ]]; then
            echo "::error::Missing GHCR_USERNAME secret. Set it to the GitHub username that owns GHCR_PAT."
            exit 1
          fi

          if [[ -z "${GHCR_PAT:-}" ]]; then
            echo "::error::Missing GHCR_PAT secret. Set a token with read:packages scope."
            exit 1
          fi

      - name: Resolve and validate VPS host
        id: vps_host
        shell: bash
        env:
          RAW_VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          set -euo pipefail

          host="${RAW_VPS_HOST#http://}"
          host="${host#https://}"
          host="${host%%/*}"

          if [[ -z "$host" ]]; then
            echo "::error::VPS_HOST is empty or invalid. Set it to a plain hostname or public IP."
            exit 1
          fi

          # If the secret was saved as host:port, keep only host because port is configured separately.
          if [[ "$host" =~ ^([^:]+):[0-9]+$ ]]; then
            host="${BASH_REMATCH[1]}"
          fi

          if [[ "$host" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Using VPS IP target."
          else
            if ! getent hosts "$host" >/dev/null; then
              echo "::error::Cannot resolve VPS_HOST '$host'. Use a valid DNS hostname or direct server IP."
              exit 1
            fi
            resolved_ip="$(getent hosts "$host" | awk '{print $1; exit}')"
            echo "Resolved VPS host '$host' to '$resolved_ip'"
            if [[ "$resolved_ip" =~ ^104\.2[0-9]\.|^172\.(6[4-9]|7[0-9])\.|^188\.114\.|^190\.93\.|^197\.234\.|^198\.41\. ]]; then
              echo "::warning::VPS_HOST appears to resolve to a Cloudflare edge IP. SSH will timeout unless you use origin server IP or a DNS-only (unproxied) host."
            fi
          fi

          echo "host=$host" >> "$GITHUB_OUTPUT"

      - name: Resolve VPS SSH port
        id: vps_port
        shell: bash
        env:
          RAW_VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          set -euo pipefail
          port="${RAW_VPS_PORT:-22}"
          if [[ -z "$port" ]]; then
            port="22"
          fi

          if ! [[ "$port" =~ ^[0-9]+$ ]]; then
            echo "::error::VPS_PORT must be numeric (for example: 22)."
            exit 1
          fi

          if (( port < 1 || port > 65535 )); then
            echo "::error::VPS_PORT must be between 1 and 65535."
            exit 1
          fi

          echo "port=$port" >> "$GITHUB_OUTPUT"

      - name: Preflight SSH and target path
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ steps.vps_host.outputs.host }}
          port: ${{ steps.vps_port.outputs.port }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 90s
          command_timeout: 2m
          script: |
            set -e
            mkdir -p "${{ secrets.VPS_DEPLOY_PATH }}"
            touch "${{ secrets.VPS_DEPLOY_PATH }}/.write_test"
            rm -f "${{ secrets.VPS_DEPLOY_PATH }}/.write_test"
            echo "SSH preflight OK"

      - name: Copy deployment files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ steps.vps_host.outputs.host }}
          port: ${{ steps.vps_port.outputs.port }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "deploy/*"
          target: "${{ secrets.VPS_DEPLOY_PATH }}"
          strip_components: 1
          timeout: 90s
          command_timeout: 20m
          debug: true

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOMAIN: ${{ secrets.DOMAIN }}
          GHCR_REPO_OWNER: ${{ needs.build-and-push.outputs.ghcr_owner }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          GHCR_USER: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_PAT }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          JWT_ACCESS_EXPIRES: ${{ secrets.JWT_ACCESS_EXPIRES }}
          JWT_REFRESH_EXPIRES: ${{ secrets.JWT_REFRESH_EXPIRES }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          R2_REGION: ${{ secrets.R2_REGION }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        with:
          host: ${{ steps.vps_host.outputs.host }}
          port: ${{ steps.vps_port.outputs.port }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 90s
          command_timeout: 20m
          envs: DOMAIN,GHCR_REPO_OWNER,IMAGE_TAG,GHCR_USER,GHCR_TOKEN,POSTGRES_USER,POSTGRES_PASSWORD,POSTGRES_DB,DATABASE_URL,REDIS_URL,JWT_ACCESS_SECRET,JWT_REFRESH_SECRET,JWT_ACCESS_EXPIRES,JWT_REFRESH_EXPIRES,R2_ACCOUNT_ID,R2_ACCESS_KEY_ID,R2_SECRET_ACCESS_KEY,R2_BUCKET_NAME,R2_PUBLIC_URL,R2_REGION,R2_ENDPOINT
          script: |
            set -e
            DEPLOY_PATH="${{ secrets.VPS_DEPLOY_PATH }}"
            mkdir -p "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"

            OWNER_LOWER="$(echo "$GHCR_REPO_OWNER" | tr '[:upper:]' '[:lower:]' | tr -d '\r')"
            echo "Using GHCR owner: $OWNER_LOWER"

            cat > .env <<EOF
            DOMAIN=$DOMAIN
            GHCR_REPO_OWNER=$OWNER_LOWER
            IMAGE_TAG=$IMAGE_TAG
            POSTGRES_USER=$POSTGRES_USER
            POSTGRES_PASSWORD=$POSTGRES_PASSWORD
            POSTGRES_DB=$POSTGRES_DB
            DATABASE_URL=$DATABASE_URL
            REDIS_URL=$REDIS_URL
            JWT_ACCESS_SECRET=$JWT_ACCESS_SECRET
            JWT_REFRESH_SECRET=$JWT_REFRESH_SECRET
            JWT_ACCESS_EXPIRES=$JWT_ACCESS_EXPIRES
            JWT_REFRESH_EXPIRES=$JWT_REFRESH_EXPIRES
            R2_ACCOUNT_ID=$R2_ACCOUNT_ID
            R2_ACCESS_KEY_ID=$R2_ACCESS_KEY_ID
            R2_SECRET_ACCESS_KEY=$R2_SECRET_ACCESS_KEY
            R2_BUCKET_NAME=$R2_BUCKET_NAME
            R2_PUBLIC_URL=$R2_PUBLIC_URL
            R2_REGION=$R2_REGION
            R2_ENDPOINT=$R2_ENDPOINT
            EOF

            unset GITHUB_REPOSITORY_OWNER
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker compose -f docker-compose.prod.yml --env-file .env config | grep 'image:'
            docker compose -f docker-compose.prod.yml --env-file .env pull
            docker compose -f docker-compose.prod.yml --env-file .env up -d --remove-orphans
            docker image prune -af
